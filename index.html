<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photography and visual work by Your Name.">
  <title>Your Name — Creative Portfolio</title>

  <link rel="stylesheet" href="css/fonts.css">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">Your Name</a>

      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <button class="nav-toggle" id="nav-toggle"
              aria-expanded="false"
              aria-controls="site-nav"
              aria-label="Open navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main id="main-content">

  <!-- ===================== HERO ===================== -->
  <!-- Replace images/ui/hero.jpg with your own hero image (recommended: 1600×900 or wider) -->
  <section class="hero">
    <div class="hero-image">
      <img src="images/ui/hero.jpg" alt="" aria-hidden="true" width="1600" height="900">
    </div>
    <div class="hero-text">
      <div class="container">
        <h1>Art that speaks<br>without words.</h1>
        <p class="hero-sub">Photography &amp; visual work by <strong>Your Name</strong></p>
        <a href="gallery.html" class="btn btn--primary">View the Gallery</a>
      </div>
    </div>
  </section>

  <!-- ===================== FEATURED WORK ===================== -->
  <!-- Replace work-1.jpg, work-2.jpg, work-3.jpg with your own images -->
  <section class="featured section">
    <div class="container">
      <h2 class="section-title">Selected Work</h2>
      <div class="featured-grid">

        <a href="gallery.html" class="featured-item">
          <img src="images/gallery/work-1.jpg" alt="Series One — featured piece" loading="lazy">
          <span class="featured-label">Series One</span>
        </a>

        <a href="gallery.html" class="featured-item">
          <img src="images/gallery/work-2.jpg" alt="Series Two — featured piece" loading="lazy">
          <span class="featured-label">Series Two</span>
        </a>

        <a href="gallery.html" class="featured-item">
          <img src="images/gallery/work-3.jpg" alt="Series Three — featured piece" loading="lazy">
          <span class="featured-label">Series Three</span>
        </a>

      </div>
    </div>
  </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Your Name. All rights reserved.</p>
      <nav aria-label="Footer navigation">
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
