<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photography gallery — browse the full collection by Your Name.">
  <title>Gallery — Your Name</title>

  <link rel="stylesheet" href="css/fonts.css">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">Your Name</a>

      <nav class="site-nav" id="site-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="gallery.html" class="active">Gallery</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <button class="nav-toggle" id="nav-toggle"
              aria-expanded="false"
              aria-controls="site-nav"
              aria-label="Open navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===================== PAGE HEADER ===================== -->
  <section class="page-header">
    <div class="container">
      <h1>Gallery</h1>
      <p>A collection of photographic work. Click any image to open it full screen.</p>
    </div>
  </section>

  <!-- ===================== GALLERY GRID ===================== -->
  <!--
    To add images:
    1. Place your .jpg or .webp files in images/gallery/
    2. Copy a .gallery-item button below and update src, alt, and data-caption
       IMPORTANT: Write a real description in alt="" and data-caption="" for each image
       e.g. alt="Watercolour of a sleeping tabby cat, warm orange tones"
    3. Add class="gallery-item--wide" to any item you want to span 2 columns

    Recommended image size: 1200px on the longest side, under 300 KB per file.
  -->
  <main class="section" id="main-content">
    <div class="container">
      <div class="gallery-grid" id="gallery-grid">

        <button class="gallery-item gallery-item--wide"
                data-src="images/gallery/work-1.jpg"
                data-caption="Work 1">
          <img src="images/gallery/work-1.jpg" alt="Work 1" loading="lazy">
        </button>

        <button class="gallery-item"
                data-src="images/gallery/work-2.jpg"
                data-caption="Work 2">
          <img src="images/gallery/work-2.jpg" alt="Work 2" loading="lazy">
        </button>

        <button class="gallery-item"
                data-src="images/gallery/work-3.jpg"
                data-caption="Work 3">
          <img src="images/gallery/work-3.jpg" alt="Work 3" loading="lazy">
        </button>

        <button class="gallery-item"
                data-src="images/gallery/work-4.jpg"
                data-caption="Work 4">
          <img src="images/gallery/work-4.jpg" alt="Work 4" loading="lazy">
        </button>

        <button class="gallery-item"
                data-src="images/gallery/work-5.jpg"
                data-caption="Work 5">
          <img src="images/gallery/work-5.jpg" alt="Work 5" loading="lazy">
        </button>

        <button class="gallery-item gallery-item--wide"
                data-src="images/gallery/work-6.jpg"
                data-caption="Work 6">
          <img src="images/gallery/work-6.jpg" alt="Work 6" loading="lazy">
        </button>

        <button class="gallery-item"
                data-src="images/gallery/work-7.jpg"
                data-caption="Work 7">
          <img src="images/gallery/work-7.jpg" alt="Work 7" loading="lazy">
        </button>

        <button class="gallery-item"
                data-src="images/gallery/work-8.jpg"
                data-caption="Work 8">
          <img src="images/gallery/work-8.jpg" alt="Work 8" loading="lazy">
        </button>

        <button class="gallery-item"
                data-src="images/gallery/work-9.jpg"
                data-caption="Work 9">
          <img src="images/gallery/work-9.jpg" alt="Work 9" loading="lazy">
        </button>

      </div>
    </div>
  </main>

  <!-- ===================== LIGHTBOX ===================== -->
  <div class="lightbox" id="lightbox"
       role="dialog" aria-modal="true" aria-label="Image viewer"
       hidden>
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev"  id="lightbox-prev"  aria-label="Previous image">&#8592;</button>
    <button class="lightbox-next"  id="lightbox-next"  aria-label="Next image">&#8594;</button>
    <figure class="lightbox-figure">
      <img id="lightbox-img" src="" alt="">
      <figcaption id="lightbox-caption"></figcaption>
    </figure>
  </div>

  <!-- ===================== FOOTER ===================== -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Your Name. All rights reserved.</p>
      <nav aria-label="Footer navigation">
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
